version: 2

builds:
  - main: ./cmd/renovate-server
    binary: renovate-server
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{.Version}}"]
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]

checksum:
  name_template: checksums.txt

changelog:
  use: github-native
