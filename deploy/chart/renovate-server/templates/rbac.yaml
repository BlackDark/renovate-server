{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "renovate-server.fullname" . }}
  namespace: {{ .Values.rbac.jobNamespace | default .Release.Namespace }}
  labels:
    {{- include "renovate-server.labels" . | nindent 4 }}
rules:
  # Exactly what the kubernetes executor needs: manage renovate Jobs.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "renovate-server.fullname" . }}
  namespace: {{ .Values.rbac.jobNamespace | default .Release.Namespace }}
  labels:
    {{- include "renovate-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "renovate-server.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "renovate-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
