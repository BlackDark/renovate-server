image:
  repository: ghcr.io/blackdark/renovate-server
  tag: ""            # defaults to appVersion
  pullPolicy: IfNotPresent

# In-memory store: keep 1 replica.
replicaCount: 1

# Rendered verbatim into the ConfigMap as config.yaml.
# See examples/config.yaml in the repository for the schema.
config: {}

# Secrets are injected as env vars referenced by ${VAR} in config.
envFrom: []
# - secretRef:
#     name: renovate-server-secrets

rbac:
  # Create Role/RoleBinding for the kubernetes executor (Jobs).
  create: true
  jobNamespace: ""   # defaults to release namespace

serviceAccount:
  create: true
  name: ""

cache:
  pvc:
    create: false
    name: renovate-cache
    size: 10Gi
    storageClassName: ""
    accessModes: [ReadWriteOnce]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  # - host: renovate.example.com
  #   paths:
  #     - path: /
  #       pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}
